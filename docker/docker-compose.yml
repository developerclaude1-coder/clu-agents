# CLU Agent Cluster + Local GUI
# Each agent has its own named volume for memory persistence.
# Agents run on-demand (no restart — spawned per task by clu-worker).
# Open WebUI provides the local chat GUI on port 8543.
#
# Build all agents: docker compose build
# Run Open WebUI:   docker compose up -d open-webui
# Run agent task:   docker compose run --rm goo (task via TASK_JSON env)

x-agent-base: &agent-base
  build:
    context: .
    dockerfile: Dockerfile.base
  network_mode: host
  environment:
    OLLAMA_HOST:        "http://100.90.97.7:11434"
    OLLAMA_FAST_MODEL:  "llama3.1:8b"
    OLLAMA_CODE_MODEL:  "qwen2.5-coder:14b"
    OLLAMA_THINK_MODEL: "deepseek-r1:14b"
    OLLAMA_TIMEOUT:     "240"
  volumes:
    - ../agents/{agent_name}/memory:/agent/memory
    - /home/knowam/tools/clu-tasks/outputs:/agent/outputs

services:

  # ── Open WebUI — Local Chat GUI ────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: clu-open-webui
    restart: unless-stopped
    network_mode: host
    environment:
      OLLAMA_BASE_URL:       "http://100.90.97.7:11434"
      WEBUI_PORT:            "8543"
      PORT:                  "8543"
      WEBUI_SECRET_KEY:      "clu-dev-secret-2026"
      WEBUI_AUTH:            "false"
      DEFAULT_MODELS:        "llama3.1:8b"
      # Gemini via OpenAI-compatible endpoint
      OPENAI_API_KEY:        "${GEMINI_API_KEY:-}"
      OPENAI_API_BASE_URL:   "https://generativelanguage.googleapis.com/v1beta/openai"
    volumes:
      - /home/knowam/tools/open-webui-data:/app/backend/data

  # ── Agents (on-demand, spawned per task) ──────────────────────────────────

  tool-specialist:
    <<: *agent-base
    container_name: clu-agent-tool-specialist
    environment:
      AGENT_NAME: tool-specialist
      OLLAMA_HOST:        "http://100.90.97.7:11434"
      OLLAMA_FAST_MODEL:  "llama3.1:8b"
      OLLAMA_CODE_MODEL:  "qwen2.5-coder:14b"
      OLLAMA_THINK_MODEL: "deepseek-r1:14b"
    volumes:
      - ../agents/tool-specialist/CLAUDE.md:/agent/CLAUDE.md:ro
      - agent-tool-specialist-memory:/agent/memory
      - /home/knowam/tools/clu-tasks/outputs:/agent/outputs

  mcp-specialist:
